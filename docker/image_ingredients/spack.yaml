spack:
  specs:
  - cmake
  - python
  - py-cython
  - py-numpy
  - py-pip
  - py-jinja2
  - netcdf-cxx4
  - openmpi
  - sundials
  - petsc+double+fftw+hdf5+hypre+mpi
  - slepc

  # Build everything with the external gcc (registered by `spack external
  # find gcc` in the Dockerfile). In Spack 1.2 compilers are providers of the
  # language virtuals (c/cxx/fortran), so require gcc as the provider of each
  # rather than putting '%gcc' on `all` (which applies to every node - including
  # ones with no compiler - and is now warned against). This selects that
  # compiler rather than constraining it, so Spack never falls back to trying to
  # build another compiler (e.g. cce, which is buildable:false).
  packages:
    c:
      require:
      - gcc
    cxx:
      require:
      - gcc
    fortran:
      require:
      - gcc

  concretizer:
    unify: true
    # Prefer a portable baseline microarch. NOTE: this is only a *preference* -
    # with reuse enabled (needed for the OCI build cache) the concretizer will
    # still reuse a prebuilt binary with a newer native microarch (e.g. armv9.0a
    # or x86_64_v4/AVX-512), which then SIGILLs on older hardware / Docker VMs.
    # The actual portability guarantee is a hard `require: target=...` injected
    # per-arch in hermes-3-builder.dockerfile (this shared file cannot branch on
    # architecture). Keep this preference as defence-in-depth for source builds.
    targets:
      granularity: generic

  view: /opt/views/view
