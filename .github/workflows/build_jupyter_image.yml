name: Build hermes-3-jupyter Docker image

# Configures this workflow to run every time a change is pushed to the master branch,
# when a release is released, or when manually triggered.
on:
  push:
    branches:
      - 'master'
  release:
    types: [released]
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: read
  packages: write

# Serialize runs so overlapping push/release/dispatch builds don't race on the
# shared image tags.
concurrency:
  group: build-jupyter-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: boutproject/hermes-3-jupyter
  DOCKERFILE: docker/hermes-3-jupyter.dockerfile

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Enable emulation so we can build the arm64 variant on an amd64 runner.
      # The steps here are just apt/pip installs, so emulation is cheap enough
      # that a native-runner matrix is unnecessary for this image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # set "latest" tag
            type=raw,value=latest,enable={{is_default_branch}}
            # always tag the most recent build as 'edge'
            type=raw,value=edge
            # short sha tag
            type=sha,enable={{is_default_branch}}
            # tag with semantic version
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # tag with branch name
            type=ref,event=branch,enable={{is_default_branch}}

      # Build and push Docker image with Buildx
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
