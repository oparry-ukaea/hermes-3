---
name: Update Python test dependencies

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-python-test-dependencies:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Update pinned upstream SHAs
        run: |
          python3 <<'PY'
          import pathlib
          import re
          import subprocess

          requirements_path = pathlib.Path('.github/requirements-ci-master.txt')
          content = requirements_path.read_text()

          targets = [
              ('boutdata', 'https://github.com/boutproject/boutdata.git', 'master'),
              ('xbout', 'https://github.com/boutproject/xbout.git', 'master'),
              ('xhermes', 'https://github.com/boutproject/xhermes.git', 'main'),
          ]

          updated = content
          changed = False

          for package, repo_url, branch in targets:
              latest_sha = subprocess.check_output(
                  ['git', 'ls-remote', repo_url, f'refs/heads/{branch}'],
                  text=True,
              ).split()[0]
              pattern = rf'^{package} @ git\+{re.escape(repo_url)}@[0-9a-f]{{40}}$'
              replacement = f'{package} @ git+{repo_url}@{latest_sha}'
              new_updated, count = re.subn(pattern, replacement, updated, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match for {package}, found {count}')
              changed = changed or new_updated != updated
              updated = new_updated

          if changed:
              requirements_path.write_text(updated)
          PY

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/update-python-test-dependencies
          commit-message: Update Python test dependency SHAs
          title: Update Python test dependency SHAs
          body: |
            Updates the pinned upstream SHAs used for Hermes-3 Python test dependencies.

            This keeps CI near the latest xhermes, xbout, and boutdata default branches
            while leaving required PR CI reproducible.
          delete-branch: true